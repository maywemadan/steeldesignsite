<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steel · Index — direções &amp; páginas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style/tokens.css">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="directions/concreto.jsx"></script>
<script type="text/babel" src="directions/galeria.jsx"></script>
<script type="text/babel" src="directions/aco.jsx"></script>

<script type="text/babel" src="pages/emp-detail-a.jsx"></script>
<script type="text/babel" src="pages/emp-detail-b.jsx"></script>
<script type="text/babel" src="pages/emp-list-a.jsx"></script>
<script type="text/babel" src="pages/emp-list-b.jsx"></script>
<script type="text/babel" src="pages/about-a.jsx"></script>
<script type="text/babel" src="pages/about-b.jsx"></script>
<script type="text/babel" src="pages/contact-a.jsx"></script>
<script type="text/babel" src="pages/contact-b.jsx"></script>
<script type="text/babel" src="pages/process-a.jsx"></script>
<script type="text/babel" src="pages/process-b.jsx"></script>
<script type="text/babel" src="pages/construct-a.jsx"></script>
<script type="text/babel" src="pages/construct-b.jsx"></script>

<script type="text/babel">
  function App() {
    const Concreto    = window.ConcretoDirection;
    const Galeria     = window.GaleriaDirection;
    const Aco         = window.AcoDirection;
    const EmpDetailA  = window.EmpDetailA;
    const EmpDetailB  = window.EmpDetailB;
    const EmpListA    = window.EmpListA;
    const EmpListB    = window.EmpListB;
    const AboutA      = window.AboutA;
    const AboutB      = window.AboutB;
    const ContactA    = window.ContactA;
    const ContactB    = window.ContactB;
    const ProcessA    = window.ProcessA;
    const ProcessB    = window.ProcessB;
    const ConstructA  = window.ConstructA;
    const ConstructB  = window.ConstructB;

    return (
      <DesignCanvas>
        <DCSection
          id="aco-detail"
          title="Steel · 02 · Detalhe de Empreendimento"
          subtitle="Direção Aço — duas variações: A estrutural (cream/red), B editorial (dark/foto)"
        >
          {EmpDetailA && (
            <DCArtboard id="emp-detail-a" label="A · Aço Estrutural" width={1440} height={6800}>
              <EmpDetailA />
            </DCArtboard>
          )}
          {EmpDetailB && (
            <DCArtboard id="emp-detail-b" label="B · Aço Editorial" width={1440} height={7200}>
              <EmpDetailB />
            </DCArtboard>
          )}
        </DCSection>

        <DCSection
          id="aco-list"
          title="Steel · 03 · Listagem de Empreendimentos"
          subtitle="Direção Aço — duas variações"
        >
          {EmpListA && (
            <DCArtboard id="emp-list-a" label="A · Aço Grid técnico" width={1440} height={5400}>
              <EmpListA />
            </DCArtboard>
          )}
          {EmpListB && (
            <DCArtboard id="emp-list-b" label="B · Aço Editorial" width={1440} height={5800}>
              <EmpListB />
            </DCArtboard>
          )}
        </DCSection>

        <DCSection
          id="aco-about"
          title="Steel · 04 · A Steel / Sobre"
          subtitle="Direção Aço — duas variações"
        >
          {AboutA && (
            <DCArtboard id="about-a" label="A · Aço Manifesto" width={1440} height={6200}>
              <AboutA />
            </DCArtboard>
          )}
          {AboutB && (
            <DCArtboard id="about-b" label="B · Aço Editorial" width={1440} height={6600}>
              <AboutB />
            </DCArtboard>
          )}
        </DCSection>

        <DCSection
          id="aco-process"
          title="Steel · 05 · Processo / Método"
          subtitle="Direção Aço — duas variações"
        >
          {ProcessA && (
            <DCArtboard id="process-a" label="A · Aço Diagrama" width={1440} height={4800}>
              <ProcessA />
            </DCArtboard>
          )}
          {ProcessB && (
            <DCArtboard id="process-b" label="B · Aço Diário" width={1440} height={6200}>
              <ProcessB />
            </DCArtboard>
          )}
        </DCSection>

        <DCSection
          id="aco-construct"
          title="Steel · 06 · Construções B2B"
          subtitle="Direção Aço — duas variações"
        >
          {ConstructA && (
            <DCArtboard id="construct-a" label="A · Aço Setores" width={1440} height={5200}>
              <ConstructA />
            </DCArtboard>
          )}
          {ConstructB && (
            <DCArtboard id="construct-b" label="B · Aço Cinematográfico" width={1440} height={6000}>
              <ConstructB />
            </DCArtboard>
          )}
        </DCSection>

        <DCSection
          id="aco-contact"
          title="Steel · 07 · Contato"
          subtitle="Direção Aço — duas variações"
        >
          {ContactA && (
            <DCArtboard id="contact-a" label="A · Aço Estrutural" width={1440} height={4800}>
              <ContactA />
            </DCArtboard>
          )}
          {ContactB && (
            <DCArtboard id="contact-b" label="B · Aço Conciérge" width={1440} height={5400}>
              <ContactB />
            </DCArtboard>
          )}
        </DCSection>

        <DCSection
          id="steel-home"
          title="Steel · 01 · Home — direções de referência"
          subtitle="Três direções visuais da home (referência). Aço (C) é a base seguida nas internas."
        >
          <DCArtboard id="aco" label="C · Aço — base seguida" width={1440} height={5500}>
            <Aco />
          </DCArtboard>
          <DCArtboard id="concreto" label="A · Concreto" width={1440} height={5800}>
            <Concreto />
          </DCArtboard>
          <DCArtboard id="galeria" label="B · Galeria" width={1440} height={6500}>
            <Galeria />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>

</body>
</html>
